<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vigil · Record Intake</title>
<style>
  :root{
    --bg:#050506; --surface:rgba(15,15,18,0.9); --inset:rgba(255,255,255,0.03);
    --border:rgba(255,255,255,0.12); --text:#f7f7f8; --soft:#b0b0b9; --faint:#767681;
    --accent:#6c8cff; --accent-bright:#a2b4ff; --amber:#f0b85a; --danger:#ff7272;
    --font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --mono:"SFMono-Regular","Cascadia Code",Consolas,monospace;
  }
  *{box-sizing:border-box;border-radius:0}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;
    padding:40px 18px 60px}
  .wrap{width:100%;max-width:540px}
  .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
  h1{font-size:17px;font-weight:650;letter-spacing:.02em;margin:0}
  .badge{font:600 9px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--faint);
    border:1px solid var(--border);padding:4px 8px}
  .sub{color:var(--faint);font-size:12.5px;margin:0 0 24px}
  .panel{border:1px solid var(--border);background:var(--surface);padding:18px}
  .label{font:600 8px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  select,input[type=text]{width:100%;background:#0a0f16;border:1px solid var(--border);color:var(--text);
    padding:10px 11px;font-family:var(--font);font-size:13px;outline:none}
  select:focus,input:focus{border-color:var(--accent)}
  .field{margin-bottom:14px}
  .controls{display:flex;gap:9px;align-items:stretch;flex-wrap:wrap}
  .mic{display:inline-flex;align-items:center;gap:10px;padding:11px 16px;font-size:13px;font-weight:560;
    color:var(--text);background:rgba(255,255,255,0.03);border:1px solid var(--border);cursor:pointer}
  .mic:hover:not(:disabled){background:rgba(255,255,255,0.06)}
  .mic:disabled{opacity:.55;cursor:default}
  .mic .dot{width:10px;height:10px;background:var(--accent-bright)}
  .mic.rec{border-color:rgba(255,114,114,.5);color:var(--danger);background:rgba(255,114,114,.1)}
  .mic.rec .dot{background:var(--danger);animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:.25}}
  .textrow{display:flex;flex:1;min-width:200px;gap:8px;margin-top:12px}
  .textrow button{padding:0 14px;font-family:var(--font);font-size:13px;font-weight:560;color:var(--accent-bright);
    background:rgba(255,255,255,0.03);border:1px solid var(--border);cursor:pointer}
  .textrow button:hover:not(:disabled){border-color:var(--accent)}
  .err{color:var(--danger);font-size:12.5px;margin-top:10px}
  .spin{color:var(--faint);font-size:12.5px;margin-top:12px;display:none}
  .result{margin-top:16px;border-top:1px solid var(--border);padding-top:16px;display:none}
  .esi{display:flex;align-items:center;gap:14px}
  .esi .n{width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:26px;
    font-weight:800;border:1px solid currentColor}
  .esi .n.e1{color:var(--danger)} .esi .n.e2{color:#f0955a} .esi .n.e3{color:var(--amber)}
  .esi .n.e4{color:#63c98b} .esi .n.e5{color:var(--accent-bright)}
  .esi small{display:block;color:var(--soft);font-size:12.5px;margin-top:3px}
  .crit{font-size:12.5px;line-height:1.5;color:var(--soft);margin:12px 0 0}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chip{border:1px solid var(--border);color:var(--soft);padding:4px 8px;font-size:12px}
  .heard{margin:12px 0 0;font-size:12px;font-style:italic;color:var(--faint)}
  .confirm{margin:10px 0 0;font-size:10.5px;color:var(--amber);letter-spacing:.02em}
  ::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>Vigil · Record Intake</h1>
      <span class="badge" id="conn">Backend</span>
    </div>
    <p class="sub">Speak a patient's reason for visit — Vigil transcribes it and assigns the initial ESI (1–5).</p>

    <div class="panel">
      <div class="field">
        <div class="label">Ground in chart (optional)</div>
        <select id="pt"><option value="">No chart — symptoms only</option></select>
      </div>

      <div class="controls">
        <button id="mic" class="mic"><span class="dot"></span><span id="miclabel">Record intake</span></button>
      </div>
      <div class="textrow">
        <input id="txt" type="text" placeholder="or type symptoms…" />
        <button id="go">Grade</button>
      </div>
      <div id="err" class="err"></div>
      <div id="spin" class="spin">Transcribing &amp; grading…</div>

      <div id="result" class="result">
        <div class="esi"><div id="num" class="n">–</div>
          <div><div class="label">Initial ESI</div><small id="dp">–</small></div></div>
        <p id="crit" class="crit"></p>
        <div id="res" class="chips"></div>
        <p id="heard" class="heard"></p>
        <p class="confirm">Decision support — a clinician confirms this grade.</p>
      </div>
    </div>
  </div>

<script>
const $=id=>document.getElementById(id);
const mic=$('mic'), miclabel=$('miclabel'), errEl=$('err'), spin=$('spin');

fetch('/patients').then(r=>r.json()).then(d=>{
  (d.patients||[]).forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name;$('pt').appendChild(o);});
  $('conn').textContent='Backend live';
}).catch(()=>{ $('conn').textContent='Backend offline'; });

let rec=null, chunks=[];
mic.onclick=async()=>{
  errEl.textContent='';
  if(rec&&rec.state==='recording'){rec.stop();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    rec=new MediaRecorder(stream); chunks=[];
    rec.ondataavailable=e=>e.data.size&&chunks.push(e.data);
    rec.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());
      mic.classList.remove('rec'); miclabel.textContent='Record intake';
      const blob=new Blob(chunks,{type:rec.mimeType||'audio/webm'});
      const ext=blob.type.includes('ogg')?'ogg':blob.type.includes('wav')?'wav':'webm';
      const fd=new FormData(); fd.append('audio',blob,'intake.'+ext); fd.append('patient_id',$('pt').value);
      send(fd);
    };
    rec.start(); mic.classList.add('rec'); miclabel.textContent='Stop';
  }catch(e){ errEl.textContent='Microphone blocked: '+e.message+' — allow mic access, or type below.'; }
};
$('go').onclick=()=>{const t=$('txt').value.trim(); if(!t){errEl.textContent='Type an intake or use the mic.';return;}
  const fd=new FormData(); fd.append('text',t); fd.append('patient_id',$('pt').value); send(fd);};
$('txt').addEventListener('keydown',e=>{if(e.key==='Enter')$('go').click();});

async function send(fd){
  errEl.textContent=''; spin.style.display='block'; $('result').style.display='none';
  try{
    const r=await fetch('/intake',{method:'POST',body:fd});
    const d=await r.json();
    if(!r.ok) throw new Error(d.detail||('HTTP '+r.status));
    render(d);
  }catch(e){ errEl.textContent='Failed: '+e.message; }
  finally{ spin.style.display='none'; }
}
function chips(el,arr){el.innerHTML=''; (arr||[]).slice(0,5).forEach(x=>{const s=document.createElement('span');s.className='chip';s.textContent=x;el.appendChild(s);});}
function render(d){
  const n=$('num'); n.textContent=d.esi; n.className='n e'+d.esi;
  $('dp').textContent='Decision '+(d.esi_decision_point||'?');
  $('crit').textContent=d.esi_criteria||'';
  chips($('res'),d.predicted_resources);
  $('heard').textContent=d.transcript?('Heard: “'+d.transcript+'”'):'';
  $('result').style.display='block';
}
</script>
</body>
</html>
